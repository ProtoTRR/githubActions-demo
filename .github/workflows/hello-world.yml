name: Hello World Workflow

# triggers the workflow on every push
on: [push, pull_request ]

# groups the steps to be run
jobs:
  say-hello:
    # specifies the environment
    runs-on: ubuntu-latest
    # check out code and run a shell command
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "👋 Hello from your first GitHub Action!"
  print-time:
    name: "Print the current time."
    runs-on: ubuntu-latest
    steps:
      - name: "Print the current time"
        run: date
  print-vars:
    name: "Print secrets and variables."
    runs-on: ubuntu-latest
    steps:
      - name: "Print secrets and variables"
        run: |
          echo "::add-mask::${{ secrets.MY_SECRET }}"
          echo "MY_SECRET_KEY is: ${{ secrets.MY_SECRET }}"
          echo "JUNK is: ${{ secrets.JUNK }}"
          echo "ABCD1234 is: ${{ secrets.ABCD1234 }}"

